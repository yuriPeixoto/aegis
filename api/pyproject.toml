[tool.ruff]
target-version = "py314"
line-length = 100
src = ["app", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["B008"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.mypy]
python_version = "3.14"
strict = true
ignore_missing_imports = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = "app.services.business_hours_service"
ignore_errors = true

[[tool.mypy.overrides]]
module = "app.services.calendar_reminder_service"
ignore_errors = true

[[tool.mypy.overrides]]
module = "app.routers.settings"
ignore_errors = true

[[tool.mypy.overrides]]
module = "app.routers.canned_responses"
ignore_errors = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
