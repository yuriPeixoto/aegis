<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark purple background -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="#160d2e"/>
  <!-- Purple overlay (brand-purple/20) -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="#8B5CF6" fill-opacity="0.2"/>
  <!-- Purple border (brand-purple/40) -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-opacity="0.45"/>
  <!-- Neon green lightning bolt (Lucide Zap), scaled/centered in 32x32 -->
  <g transform="translate(9 9) scale(0.583)">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="#39FF14"/>
  </g>
</svg>
