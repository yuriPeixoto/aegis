<VirtualHost *:80>
    ServerName gestaofrotas-frigonorte.unitopconsultoria.com.br
    ServerAlias gestaofrotas-frigonorte.unitopconsultoria.com.br

    DocumentRoot /var/www/gestaofrotas-frigonorte/public

    AliasMatch ^/api/(?!aegis/)(.*) /var/www/gestaofrotas-frigonorte/api/$1
    <Directory /var/www/gestaofrotas-frigonorte/api>
        Options -Indexes
        AllowOverride All
        Order allow,deny
        allow from all
    </Directory>
    <Directory /var/www/gestaofrotas-frigonorte/public/>
        Options -Indexes
        AllowOverride All
        Order allow,deny
        allow from all
    </Directory>

    RewriteEngine On
    RewriteCond %{THE_REQUEST} !\s/api/aegis/
    RewriteRule ^ https://gestaofrotas-frigonorte.unitopconsultoria.com.br%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerAdmin financeiro@unitopconsultoria.com.br
    ServerName gestaofrotas-frigonorte.unitopconsultoria.com.br
    ServerAlias gestaofrotas-frigonorte.unitopconsultoria.com.br
    DocumentRoot /var/www/gestaofrotas-frigonorte/public
    ErrorLog ${APACHE_LOG_DIR}/error-gestaofrotas-frigonorte.unitopconsultoria.com.br.log
    CustomLog ${APACHE_LOG_DIR}/access-gestaofrotas-frigonorte.unitopconsultoria.com.br.log combined

    # Roteia /api/ para o Lumen (fora do DocumentRoot), exceto /api/aegis/ que vai para o Laravel
    AliasMatch ^/api/(?!aegis/)(.*) /var/www/gestaofrotas-frigonorte/api/$1

    <Directory /var/www/gestaofrotas-frigonorte/api>
        Options -Indexes
        AllowOverride All
        Order allow,deny
        allow from all
    </Directory>

    # Jornada Cliente — subfolder /gestorjornada
    Alias /gestorjornada /var/www/gestaofrotas-frigonorte/gestorjornada/public

    <Directory /var/www/gestaofrotas-frigonorte/gestorjornada/public>
        Options -Indexes
        AllowOverride All
        Order allow,deny
        allow from all
    </Directory>

    <Directory /var/www/gestaofrotas-frigonorte/public/>
        Options -Indexes
        AllowOverride All
        Order allow,deny
        allow from all
    </Directory>

    SSLEngine on
    SSLCertificateFile      /certificado/_unitopconsultoria_com_br.crt
    SSLCertificateKeyFile /certificado/unitopconsultoria.key
    SSLCertificateChainFile /certificado/Sectigo_RSA_Domain_Validation_Secure_Server_CA.crt
</VirtualHost>
